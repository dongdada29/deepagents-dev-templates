[project]
name = "deepagents-acp-py"
version = "0.1.0"
description = "ACP (Agent Client Protocol) server for Python agents — enables IDE integration with Zed, JetBrains, and other ACP clients"
readme = "README.md"
keywords = [
    "deepagents",
    "acp",
    "agent-client-protocol",
    "ai-agent",
    "nuwaclaw",
    "zed",
    "stdio",
]
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "Nuwax AI", email = "dev@nuwax.ai" },
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "agent-client-protocol>=0.8.0",
    "pydantic>=2.7",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5.0",
    "ruff>=0.8",
    "pyright>=1.1",
]

[dependency-groups]
dev = [
    "deepagents-acp-py[dev]",
]

[project.urls]
Homepage = "https://github.com/nuwax-ai/deepagents-dev-templates"
Documentation = "https://github.com/nuwax-ai/deepagents-dev-templates"
Repository = "https://github.com/nuwax-ai/deepagents-dev-templates"
Issues = "https://github.com/nuwax-ai/deepagents-dev-templates/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/deepagents_acp_py"]

[tool.ruff]
line-length = 100
target-version = "py310"
extend-exclude = ["dist", "build", ".venv"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "Q", "RUF", "C90"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.pyright]
pythonVersion = "3.10"
typeCheckingMode = "basic"
include = ["src/deepagents_acp_py"]
exclude = ["**/__pycache__", ".venv", "tests"]
reportMissingTypeStubs = false
